<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>api-dash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text2: #8888a0;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --glow: 0 0 20px rgba(74, 222, 128, 0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ─────────────────────────────────────── */

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--green); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
    50% { opacity: 0.5; box-shadow: 0 0 12px var(--green); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }

  /* ── Grand Total ────────────────────────────────── */

  .grand-total-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 28px 32px;
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
  }

  .grand-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 56px;
    font-weight: 300;
    letter-spacing: -2px;
    transition: color 0.5s;
  }

  .grand-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text2);
    margin-top: 4px;
  }

  .grand-stat {
    text-align: center;
  }

  .grand-stat .value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 400;
  }

  .grand-stat .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text2);
    margin-top: 2px;
  }

  .divider-v {
    width: 1px;
    height: 48px;
    background: var(--border);
  }

  /* ── Gauges Grid ────────────────────────────────── */

  .gauges {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 28px 32px;
  }

  .gauge-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
  }

  .gauge-card:hover {
    border-color: var(--text2);
    box-shadow: var(--glow);
  }

  .dismiss-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 15px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    line-height: 1;
    padding: 2px 5px;
    border-radius: 4px;
  }

  .gauge-card:hover .dismiss-btn { opacity: 1; }
  .dismiss-btn:hover { color: var(--red); background: rgba(248,113,113,0.1); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 16px;
  }

  .running-total {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    padding-top: 2px;
  }

  .gauge-card .provider-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ── SVG Gauge ──────────────────────────────────── */

  .gauge-svg {
    width: 200px;
    height: 130px;
  }

  .gauge-track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 12;
    stroke-linecap: round;
  }

  .gauge-fill {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s;
    filter: drop-shadow(0 0 6px currentColor);
  }

  .gauge-needle {
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: 100px 110px;
  }

  .gauge-needle line {
    stroke: var(--text);
    stroke-width: 2;
    stroke-linecap: round;
  }

  .gauge-needle circle {
    fill: var(--text);
  }

  .gauge-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    fill: var(--text);
    text-anchor: middle;
  }

  .gauge-ticks text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    fill: var(--text2);
    text-anchor: middle;
  }

  /* ── Provider Cost + Budget Input ───────────────── */

  .provider-cost {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

  .budget-input-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    margin-bottom: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .budget-input {
    width: 72px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 3px 6px;
    text-align: right;
    outline: none;
    -moz-appearance: textfield;
  }

  .budget-input::-webkit-outer-spin-button,
  .budget-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .budget-input:focus {
    border-color: var(--text2);
  }

  /* ── Model Breakdown ────────────────────────────── */

  .model-list {
    width: 100%;
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .model-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 12px;
  }

  .model-name {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 170px;
  }

  .model-cost {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
  }

  /* ── Sparkline Chart ────────────────────────────── */

  .chart-section {
    padding: 0 32px 32px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .chart-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
    color: var(--text2);
  }

  .chart-svg {
    width: 100%;
    height: 160px;
  }

  .chart-line {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .chart-area {
    opacity: 0.1;
  }

  .chart-grid line {
    stroke: var(--border);
    stroke-width: 0.5;
  }

  .chart-grid text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    fill: var(--text2);
  }

  /* ── Spend Line Chart ─────────────────────────── */

  .spend-line {
    fill: none;
    stroke: var(--blue);
    stroke-width: 2;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  .spend-area {
    fill: url(#spendGrad);
    opacity: 0.15;
  }

  .avg-line {
    fill: none;
    stroke: var(--yellow);
    stroke-width: 1.5;
    stroke-dasharray: 6 3;
    opacity: 0.8;
  }

  .peak-dot {
    fill: var(--red);
    stroke: var(--bg);
    stroke-width: 2;
    filter: drop-shadow(0 0 4px var(--red));
  }

  .peak-connector {
    fill: none;
    stroke: var(--red);
    stroke-width: 1;
    stroke-dasharray: 3 4;
    opacity: 0.4;
  }

  .spend-dot {
    fill: var(--blue);
    opacity: 0.6;
  }

  .chart-legend {
    display: flex;
    gap: 20px;
    margin-top: 10px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text2);
  }

  .legend-swatch {
    width: 16px;
    height: 3px;
    border-radius: 1px;
  }

  .legend-swatch.dashed {
    background: repeating-linear-gradient(90deg, var(--yellow) 0px, var(--yellow) 4px, transparent 4px, transparent 7px);
  }

  .legend-swatch.dotted {
    background: repeating-linear-gradient(90deg, var(--red) 0px, var(--red) 2px, transparent 2px, transparent 5px);
  }

  /* ── Budget Bar ─────────────────────────────────── */

  .budget-section {
    padding: 0 32px 20px;
  }

  .budget-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }

  .budget-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .budget-header .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text2);
  }

  .budget-header .pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
  }

  .budget-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .budget-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background 0.5s;
  }

  /* ── Loading / Empty ────────────────────────────── */

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--text2);
  }

  .loading::after {
    content: '';
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-left: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 80px 32px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
  }

  .empty-state h2 {
    font-size: 16px;
    font-weight: 400;
    margin-bottom: 12px;
  }

  .empty-state code {
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 13px;
  }

  /* ── Carbon Section ─────────────────────────────── */

  .carbon-section {
    padding: 0 32px 20px;
  }

  .carbon-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .carbon-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .carbon-main {
    flex: 1;
    min-width: 200px;
  }

  .carbon-main .carbon-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .carbon-main .carbon-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 300;
  }

  .carbon-main .carbon-comparison {
    font-size: 13px;
    color: var(--text2);
    margin-top: 2px;
  }

  .carbon-stats {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
  }

  .carbon-stat {
    text-align: center;
  }

  .carbon-stat .cs-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 400;
  }

  .carbon-stat .cs-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-top: 2px;
  }

  .carbon-methodology {
    font-size: 10px;
    color: var(--text2);
    opacity: 0.6;
    font-family: 'IBM Plex Mono', monospace;
    width: 100%;
    margin-top: 4px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* ── Add Provider Tile ──────────────────────────── */

  .gauge-card.add-provider {
    border-style: dashed;
    border-color: var(--border);
    cursor: pointer;
    justify-content: center;
    min-height: 200px;
    transition: border-color 0.3s, background 0.3s;
  }

  .gauge-card.add-provider:hover {
    border-color: var(--text2);
    background: var(--surface2);
  }

  .add-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--text2);
    margin-bottom: 12px;
    transition: border-color 0.3s, color 0.3s;
  }

  .gauge-card.add-provider:hover .add-icon {
    border-color: var(--green);
    color: var(--green);
  }

  .add-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Provider Dropdown ──────────────────────────── */

  .provider-dropdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    z-index: 100;
    min-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .provider-dropdown-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }

  .provider-dropdown h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
  }

  .provider-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: var(--text);
  }

  .provider-option:hover {
    background: var(--surface2);
  }

  .provider-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .provider-option-info {
    flex: 1;
  }

  .provider-option-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .provider-option-env {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }

  .provider-option-arrow {
    color: var(--text2);
    font-size: 14px;
  }

  /* ── Co-pilot ───────────────────────────────────── */

  .copilot-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    transition: border-color 0.2s, box-shadow 0.2s;
    z-index: 200;
  }

  .copilot-toggle:hover {
    border-color: var(--green);
    box-shadow: 0 0 16px rgba(74,222,128,0.2);
  }

  .copilot-panel {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 380px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 300;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .copilot-panel.open {
    transform: translateX(0);
  }

  .copilot-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .copilot-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--green);
  }

  .copilot-provider-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    outline: none;
  }

  .copilot-close {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    line-height: 1;
  }

  .copilot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .copilot-msg {
    max-width: 90%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
  }

  .copilot-msg.user {
    background: var(--surface2);
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }

  .copilot-msg.assistant {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.15);
    align-self: flex-start;
    border-bottom-left-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    white-space: pre-wrap;
  }

  .copilot-msg.system {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    align-self: center;
    text-align: center;
  }

  .copilot-input-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .copilot-input-actions {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .copilot-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    height: 80px;
    max-height: 200px;
    overflow-y: auto;
  }

  .copilot-input:focus { border-color: var(--text2); }

  .copilot-send {
    background: var(--green);
    border: none;
    border-radius: 8px;
    color: #000;
    font-size: 16px;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .copilot-send:disabled { opacity: 0.3; cursor: default; }

  .copilot-attach {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 16px;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .copilot-attach:hover { border-color: var(--text2); color: var(--text); }

  .copilot-attachment-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }

  .copilot-attachment-badge span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .copilot-attachment-remove {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    padding: 0;
    line-height: 1;
  }

  /* ── Co-pilot toolbar + edit blocks + reset ─────── */

  .copilot-reset-row {

  /* ── Add Repo modal ─────────────────────────────── */

  .gp-modal-step { display: flex; flex-direction: column; gap: 10px; }

  .gp-status-box {

  .gp-status-box.success { border-color: var(--green); color: var(--green); }

  /* ── Google explainer accordion ─────────────────── */
  .gp-explainer {

  .gp-explainer-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    color: var(--text2);

    font-family: inherit;

  }
  .gp-explainer-toggle:hover { color: var(--text); }
  .gp-explainer-icon { font-style: normal; color: #4285f4; font-size: 13px; font-weight: bold; }
  .gp-explainer-chevron { margin-left: auto; transition: transform 0.2s; }
  .gp-explainer.open .gp-explainer-chevron { transform: rotate(180deg); }
  .gp-explainer-body {
    display: none;
    padding: 0 14px 14px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }
  .gp-explainer-body p { margin: 0 0 10px; }
  .gp-explainer-body ol { margin: 0 0 10px; padding-left: 18px; }
  .gp-explainer-body li { margin-bottom: 4px; }
  .gp-explainer-body code { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text); background: var(--surface); padding: 1px 4px; border-radius: 3px; }
  .gp-explainer-body strong { color: var(--text); }
  .gp-explainer.open .gp-explainer-body { display: block; }

  .modal-btn-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .modal-btn-secondary {
    flex: 1;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;

  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    float: right;
    margin-bottom: 4px;
  }

  .copy-btn:hover { border-color: var(--text2); color: var(--text); }

  /* ── Key paste tile ─────────────────────────────── */

  .key-paste-card {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-height: 200px;
    cursor: default;
  }

  .key-paste-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .key-paste-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;

    text-align: center;

  .key-paste-input:focus { border-color: var(--text2); }

  .key-paste-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    min-height: 16px;
    text-align: center;
  }

  .folder-scan-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .folder-scan-btn:hover { border-color: var(--text2); background: var(--surface); }
  .folder-scan-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── Scan confirm modal ─────────────────────────── */
  .scan-key-list {
    display: flex;
    flex-direction: column;

  }
  .scan-key-row {

  /* ── First-boot modal ───────────────────────────── */

  .modal-backdrop {
    position: fixed;

    color: var(--text2);

</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="status-dot" id="statusDot"></div>
    <div class="logo">api<span>-dash</span></div>
  </div>
  <div class="header-right">
    <span id="hiddenToggle" style="cursor:pointer;display:none" onclick="toggleShowHidden()"></span>
    <span id="lastUpdate">connecting...</span>
  </div>
</div>

<div id="app">
  <div class="loading">Fetching provider data</div>
</div>

<script>
// ── State ─────────────────────────────────────────

let data = null;
const providerBudgets = JSON.parse(localStorage.getItem('providerBudgets') || '{}');
const hiddenProviders = new Set(JSON.parse(localStorage.getItem('hiddenProviders') || '[]'));
let showHidden = false;

function hideProvider(id) {
  hiddenProviders.add(id);
  localStorage.setItem('hiddenProviders', JSON.stringify([...hiddenProviders]));
  render();
}

async function deleteGoogleProject(slug) {
  await fetch(`/api/google-projects/${slug}`, { method: 'DELETE' });
  hiddenProviders.delete(`gp_${slug}`);
  localStorage.setItem('hiddenProviders', JSON.stringify([...hiddenProviders]));
  fetch('/api/spend').then(r => r.json()).then(d => { if (d.providers) { data = d; render(); } });
}

function toggleShowHidden() {
  showHidden = !showHidden;
  render();
}
let globalBudgetOverride = parseFloat(localStorage.getItem('globalBudget') || '0');

function setProviderBudget(id, val) {
  const n = parseFloat(val);
  if (n > 0) providerBudgets[id] = n;
  else delete providerBudgets[id];
  localStorage.setItem('providerBudgets', JSON.stringify(providerBudgets));
  render();
}

function setGlobalBudget(val) {
  const n = parseFloat(val);
  globalBudgetOverride = n > 0 ? n : 0;
  localStorage.setItem('globalBudget', globalBudgetOverride);
  render();
}

// ── WebSocket ─────────────────────────────────────

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}`);

  ws.onmessage = (e) => {
    try {
      data = JSON.parse(e.data);
      render();
      document.getElementById("lastUpdate").textContent =
        `updated ${new Date(data.fetchedAt).toLocaleTimeString()}`;
      document.getElementById("statusDot").style.background = "var(--green)";
    } catch {}
  };

  ws.onclose = () => {
    document.getElementById("statusDot").style.background = "var(--red)";
    document.getElementById("lastUpdate").textContent = "reconnecting...";
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

// Also fetch on load in case WS is slow
fetch("/api/spend")
  .then((r) => r.json())
  .then((d) => {
    if (d.providers) {
      data = d;
      render();
    }
  })
  .catch(() => {});

connect();

// ── Config + first-boot ────────────────────────────

let copilotConfig = { llms: [], firstBoot: false };
let copilotOpen = false;
let copilotProvider = null;
let copilotMessages = [];
let copilotLoading = false;
let pendingFile = null;
let copilotHasBak = { "server.js": false, "index.html": false };

function refreshBakStatus() {
  fetch("/api/file/bak-status").then(r => r.json()).then(s => {
    copilotHasBak = s;
    renderCopilotPanel();
  }).catch(() => {});
}
refreshBakStatus();

fetch("/api/config").then(r => r.json()).then(cfg => {
  copilotConfig = cfg;
  copilotProvider = cfg.llms[0]?.id || null;
  if (cfg.firstBoot) showFirstBootModal();
  renderCopilotToggle();
}).catch(() => {});

function renderCopilotToggle() {
  let el = document.getElementById("copilotToggle");
  if (!el) {
    el = document.createElement("div");
    el.id = "copilotToggle";
    document.body.appendChild(el);
  }
  el.className = "copilot-toggle";
  el.title = "Open co-pilot";
  el.innerHTML = "✦";
  el.onclick = toggleCopilot;
}

function toggleCopilot() {
  copilotOpen = !copilotOpen;
  renderCopilotPanel();
}

function renderMsgContent(m) {
  if (m.role !== "assistant") return `<span>${escapeHtml(m.content)}</span>`;
  // Parse edit blocks out of assistant messages
  const parts = [];
  const editRe = /```edit\n([\s\S]*?)```/g;
  let last = 0, match;
  while ((match = editRe.exec(m.content)) !== null) {
    if (match.index > last) parts.push({ type: "text", text: m.content.slice(last, match.index) });
    parts.push({ type: "edit", raw: match[1] });
    last = match.index + match[0].length;
  }
  if (last < m.content.length) parts.push({ type: "text", text: m.content.slice(last) });

  return parts.map((p, i) => {
    if (p.type === "text") return `<span>${escapeHtml(p.text)}</span>`;
    // Parse FILE / FIND / REPLACE
    const fileM = p.raw.match(/^FILE:\s*(\S+)/m);
    const findM = p.raw.match(/FIND:\n([\s\S]*?)(?=\nREPLACE:|\nFULL_REPLACE:|$)/);
    const replM = p.raw.match(/REPLACE:\n([\s\S]*?)$/);
    const fullM = p.raw.match(/FULL_REPLACE:\n([\s\S]*?)$/);
    const file = fileM?.[1] || "?";
    const preview = findM ? findM[1].trim().slice(0, 120) : (fullM ? "(full file rewrite)" : "");
    const idx = `edit_${Date.now()}_${i}`;
    // Store edit data on window for the onclick
    window[idx] = { file, find: findM?.[1], replace: replM?.[1], content: fullM?.[1] };
    return `<div class="copilot-edit-block">
      <div class="copilot-edit-header">
        <span class="copilot-edit-file">✏ ${file}</span>
        ${findM ? `<span class="copilot-edit-preview">${escapeHtml(preview)}…</span>` : ""}
        ${fullM ? `<span class="copilot-edit-preview">(full rewrite)</span>` : ""}
      </div>
      <button class="copilot-edit-apply" onclick="applyEdit('${idx}')">Apply →</button>
    </div>`;
  }).join("");
}

function renderCopilotPanel() {
  let panel = document.getElementById("copilotPanel");
  if (!panel) {
    panel = document.createElement("div");
    panel.id = "copilotPanel";
    document.body.appendChild(panel);
  }
  panel.className = `copilot-panel${copilotOpen ? " open" : ""}`;

  const llmOptions = copilotConfig.llms.map(l =>
    `<option value="${l.id}" ${l.id === copilotProvider ? "selected" : ""}>${l.label} (${l.model})</option>`
  ).join("");

  const msgs = copilotMessages.map(m => `
    <div class="copilot-msg ${m.role}">${renderMsgContent(m)}</div>
  `).join("");

  const anyBak = copilotHasBak["server.js"] || copilotHasBak["index.html"];
  const resetBtns = anyBak ? Object.entries(copilotHasBak).filter(([,v])=>v).map(([name]) =>
    `<button class="copilot-reset-btn" onclick="resetFile('${name}')" title="Reset ${name} to pre-edit backup">↩ ${name}</button>`
  ).join("") : "";

  panel.innerHTML = `
    <div class="copilot-header">
      <span class="copilot-title">✦ co-pilot</span>
      ${copilotConfig.llms.length > 1
        ? `<select class="copilot-provider-select" onchange="copilotProvider=this.value">${llmOptions}</select>`
        : `<span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2)">${copilotConfig.llms[0]?.label || "no LLM"}</span>`
      }
      <button class="copilot-close" onclick="toggleCopilot()">×</button>
    </div>
    ${anyBak ? `<div class="copilot-reset-row">${resetBtns}</div>` : ""}
    <div class="copilot-toolbar">
      <button class="copilot-tool-btn" onclick="shareCodeWithCopilot('index.html')" title="Share dashboard UI code">📄 UI</button>
      <button class="copilot-tool-btn" onclick="shareCodeWithCopilot('server.js')" title="Share server code">⚙ Server</button>
      <button class="copilot-tool-btn" onclick="copilotMessages=[];renderCopilotPanel()" title="Clear chat">🗑</button>
    </div>
    <div class="copilot-messages" id="copilotMsgs">
      ${copilotMessages.length === 0
        ? `<div class="copilot-msg system">Ask about your spend, add providers, or say "change the gauge color to blue" — share the UI code first so I can make edits.</div>`
        : msgs
      }
      ${copilotLoading ? `<div class="copilot-msg system">thinking...</div>` : ""}
    </div>
    <div class="copilot-input-row">
      ${pendingFile ? `
        <div class="copilot-attachment-badge">
          <span>${pendingFile.type === "image" ? "🖼 " : "📄 "}${pendingFile.name}</span>
          <button class="copilot-attachment-remove" onclick="pendingFile=null;renderCopilotPanel()">×</button>
        </div>` : ""}
      <textarea class="copilot-input" id="copilotInput" placeholder="Ask anything… (Shift+Enter for newline)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendCopilot()}"
        ${copilotLoading || !copilotProvider ? "disabled" : ""}></textarea>
      <div class="copilot-input-actions">
        <button class="copilot-attach" title="Attach CSV or image" onclick="document.getElementById('copilotFileInput').click()">📎</button>
        <input type="file" id="copilotFileInput" accept=".csv,.png,.jpg,.jpeg,.gif,.webp" style="display:none"
          onchange="handleFileAttach(this)">
        <button class="copilot-send" onclick="sendCopilot()"
          ${copilotLoading || !copilotProvider ? "disabled" : ""}>↑</button>
      </div>
    </div>
  `;

  requestAnimationFrame(() => {
    const msgs = document.getElementById("copilotMsgs");
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  });
}

async function shareCodeWithCopilot(name) {
  const r = await fetch(`/api/file?name=${name}`);
  const d = await r.json();
  if (!r.ok) return;
  copilotMessages.push({
    role: "user",
    content: `Here's the current ${name} code:\n\`\`\`\n${d.content}\n\`\`\``
  });
  copilotMessages.push({
    role: "assistant",
    content: `Got it — I have the current ${name} (${Math.round(d.content.length / 1024)}KB). Tell me what you'd like to change.`
  });
  renderCopilotPanel();
}

async function applyEdit(idx) {
  const edit = window[idx];
  if (!edit) return;
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = "Applying…";
  try {
    const body = edit.content !== undefined
      ? { name: edit.file, content: edit.content }
      : { name: edit.file, find: edit.find, replace: edit.replace };
    const r = await fetch("/api/file", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (r.ok) {
      btn.textContent = "✓ Applied";
      btn.style.background = "var(--green)";
      refreshBakStatus();
      if (edit.file === "index.html") {
        setTimeout(() => location.reload(), 800);
      }
    } else {
      btn.textContent = d.error || "Failed";
      btn.style.background = "var(--red)";
      btn.disabled = false;
    }
  } catch (e) {
    btn.textContent = "Error";
    btn.style.background = "var(--red)";
    btn.disabled = false;
  }
}

async function resetFile(name) {
  if (!confirm(`Reset ${name} to the pre-edit backup? This will undo all co-pilot changes.`)) return;
  const r = await fetch("/api/file/reset", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ name }),
  });
  if (r.ok) {
    refreshBakStatus();
    if (name === "index.html") setTimeout(() => location.reload(), 300);
  }
}

function handleFileAttach(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = "";
  const isImage = file.type.startsWith("image/");
  const isCsv = file.name.endsWith(".csv");
  const reader = new FileReader();
  reader.onload = (e) => {
    if (isImage) {
      pendingFile = { type: "image", name: file.name, mimeType: file.type, data: e.target.result.split(",")[1] };
    } else if (isCsv) {
      pendingFile = { type: "csv", name: file.name, text: e.target.result };
    }
    renderCopilotPanel();
  };
  if (isImage) reader.readAsDataURL(file);
  else reader.readAsText(file);
}

async function sendCopilot() {
  const input = document.getElementById("copilotInput");
  const text = input?.value.trim();
  if ((!text && !pendingFile) || copilotLoading || !copilotProvider) return;

  let userContent = text || "";
  if (pendingFile?.type === "csv") {
    userContent += (userContent ? "\n\n" : "") + `**Attached: ${pendingFile.name}**\n\`\`\`csv\n${pendingFile.text.slice(0, 8000)}\n\`\`\``;
  }

  const attachment = pendingFile?.type === "image" ? { ...pendingFile } : null;
  pendingFile = null;

  copilotMessages.push({ role: "user", content: userContent, ...(attachment ? { image: attachment } : {}) });
  copilotLoading = true;
  renderCopilotPanel();
  try {
    const r = await fetch("/api/copilot", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ messages: copilotMessages, provider: copilotProvider }),
    });
    const d = await r.json();
    if (d.reply) copilotMessages.push({ role: "assistant", content: d.reply });
    else copilotMessages.push({ role: "assistant", content: `Error: ${d.error}` });
  } catch (e) {
    copilotMessages.push({ role: "assistant", content: `Network error: ${e.message}` });
  }
  copilotLoading = false;
  renderCopilotPanel();
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function scanParentForProjects() {
  const btn = document.getElementById("gpPickBtn");

  btn.textContent = "📂 Opening folder picker…";
  status.textContent = "";

  let parentPath;

    const r = await fetch("/api/pick-folder");

    if (!d.path) {
      btn.disabled = false;
      btn.textContent = "📂 Browse to projects folder";
      status.textContent = "No folder selected.";
      return;
    }
    parentPath = d.path;
  } catch (e) {
    btn.disabled = false;
    btn.textContent = "📂 Browse to projects folder";
    status.textContent = "Error: " + e.message;
    return;
  }

  btn.textContent = "📂 Scanning…";
  try {
    const r = await fetch("/api/scan-supabase-projects", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ parentPath }),
    });
    const d = await r.json();
    if (!r.ok) { status.textContent = d.error || "Scan failed"; btn.disabled = false; btn.textContent = "📂 Browse to projects folder"; return; }

    _gpFound = d.found;
    if (!_gpFound.length) {
      status.textContent = "No projects with Supabase credentials found.";
      btn.disabled = false;
      btn.textContent = "📂 Browse to projects folder";
      return;
    }

    // Render checklist
    const list = document.getElementById("gpProjectList");
    list.innerHTML = _gpFound.map((p, i) => `
      <label class="scan-key-row" style="${p.alreadyAdded ? 'opacity:0.5' : ''}">
        <input type="checkbox" id="gpProj_${i}" ${p.alreadyAdded ? 'disabled' : 'checked'}>
        <span class="scan-key-label">${p.name}</span>
        <span class="scan-key-hint">${p.alreadyAdded ? 'already added' : 'Supabase found'}</span>
      </label>
    `).join("");

    document.getElementById("gpStep1").classList.add("hidden");
    document.getElementById("gpStep2").classList.remove("hidden");
  } catch (e) {
    status.textContent = "Error: " + e.message;
    btn.disabled = false;
    btn.textContent = "📂 Browse to projects folder";
  }

async function addSelectedGoogleProjects() {
  const addBtn = document.getElementById("gpAddBtn");
  const statusEl = document.getElementById("gpAddStatus");
  addBtn.disabled = true;
  statusEl.textContent = "Checking projects…";
  statusEl.style.color = "var(--text2)";

  const toAdd = _gpFound.filter((p, i) => {
    const cb = document.getElementById(`gpProj_${i}`);
    return cb && cb.checked && !p.alreadyAdded;
  });

  if (!toAdd.length) { statusEl.textContent = "Nothing selected."; addBtn.disabled = false; return; }

  // Save all selectable projects; show setup snippet only for ones that need the logger
  const added = [], needsSnippet = [], failed = [];
  for (const p of toAdd) {
    const r = await fetch("/api/google-projects", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ title: p.name, repoPath: p.path }),
    });
    const d = await r.json();
    if (d.status === "complete") added.push(p.name);
    else if (d.status === "no_rows") { added.push(p.name); needsSnippet.push({ name: p.name, snippet: d.snippet }); }
    else if (d.status === "no_table") needsSnippet.push({ name: p.name, sql: d.sql, needsTable: true });
    else failed.push({ name: p.name, error: d.error });
  }

  if (added.length) {
    statusEl.textContent = `✓ Tile${added.length > 1 ? "s" : ""} added: ${added.join(", ")}`;
    statusEl.style.color = "var(--green)";
  }

  if (needsSnippet.length || failed.length) {
    // Show setup info for first item needing action
    const first = needsSnippet[0] || failed[0];
    document.getElementById("gpStep2").classList.add("hidden");
    document.getElementById("gpStep3").classList.remove("hidden");
    const resultBox = document.getElementById("gpResultBox");
    const sqlBox = document.getElementById("gpSqlBox");
    const sqlContent = document.getElementById("gpSqlContent");
    const actionRow = document.getElementById("gpStep3ActionRow");

    if (first.needsTable) {
      resultBox.className = "gp-status-box warning";
      resultBox.textContent = `${first.name}: No api_usage table found. Create it with this SQL, then costs will appear automatically:`;
      sqlBox.style.display = "block";
      sqlContent.textContent = first.sql;
    } else if (first.snippet) {
      resultBox.className = "gp-status-box success";
      resultBox.textContent = `✓ ${first.name} tile added — showing $0 until Gemini calls are logged.\nAdd this snippet to start tracking costs:`;
      sqlBox.style.display = "block";
      sqlContent.textContent = first.snippet;
    } else {
      resultBox.className = "gp-status-box error";
      resultBox.textContent = first.error || `Could not connect to Supabase for ${first.name}.`;
    }
    actionRow.innerHTML = `<button class="modal-btn" onclick="document.getElementById('addRepoModal').style.display='none'" style="flex:2">Done</button>`;
  } else {
    setTimeout(() => document.getElementById("addRepoModal").style.display = "none", 1200);
  }
}

async function saveScanedKeys(detected) {
  const statusEl = document.getElementById("scanConfirmStatus");
  const saved = [], failed = [];
  // Only iterate new (non-already-set) keys — those are the ones with checkboxes
  const newKeys = detected.filter(k => !k.alreadySet);
  for (let i = 0; i < newKeys.length; i++) {
    const cb = document.getElementById(`scanKey_${i}`);
    if (!cb || !cb.checked) continue;
    try {
      const r = await fetch("/api/keys", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ key: newKeys[i].value }),
      });
      const d = await r.json();
      if (r.ok) saved.push(d.label);
      else failed.push(newKeys[i].label);
    } catch { failed.push(newKeys[i].label); }
  }
  if (saved.length) {
    statusEl.textContent = `✓ Saved: ${saved.join(", ")}`;
    statusEl.style.color = "var(--green)";
    setTimeout(() => {
      fetch("/api/config").then(r=>r.json()).then(cfg => {
        copilotConfig = cfg;
        if (!copilotProvider) copilotProvider = cfg.llms[0]?.id;
        renderCopilotPanel();
      });
    }, 500);
  }
  if (failed.length) {
    statusEl.textContent += (saved.length ? " · " : "") + `Failed: ${failed.join(", ")}`;
    statusEl.style.color = "var(--red)";
  }
  setTimeout(() => document.getElementById("scanConfirmModal")?.remove(), 2000);
}

// ── Gauge helpers ─────────────────────────────────

function formatCarbonDisplay(grams) {
  if (grams < 1) return `${(grams * 1000).toFixed(0)} mg CO₂`;
  if (grams < 1000) return `${grams.toFixed(1)} g CO₂`;
  return `${(grams / 1000).toFixed(2)} kg CO₂`;
}

function formatGpuTime(seconds) {
  if (seconds < 60) return `${seconds}s`;
  if (seconds < 3600) return `${(seconds / 60).toFixed(1)}m`;
  return `${(seconds / 3600).toFixed(1)}h`;
}

function budgetColor(pct) {
  if (pct < 50) return "var(--green)";
  if (pct < 75) return "var(--yellow)";
  return "var(--red)";
}

function gaugeColor(cost, budget) {
  const pct = (cost / budget) * 100;
  return budgetColor(pct);
}

function createGaugeSVG(cost, maxCost, color) {
  // Arc from 180° to 0° (left to right, bottom half)
  const cx = 100, cy = 110, r = 80;
  const startAngle = Math.PI; // 180°
  const endAngle = 0;        // 0°
  const arcLength = Math.PI * r; // half circle

  const pct = maxCost > 0 ? Math.min(cost / maxCost, 1) : 0;
  const fillLength = arcLength * pct;
  const dashOffset = arcLength - fillLength;

  // Needle angle: 180° (left) to 0° (right)
  const needleAngle = Math.PI - (pct * Math.PI);
  const needleLen = 60;
  const nx = cx + Math.cos(needleAngle) * needleLen;
  const ny = cy - Math.sin(needleAngle) * needleLen;

  // Tick marks
  const ticks = [0, 0.25, 0.5, 0.75, 1];
  const tickLabels = ticks.map((t) => {
    const v = maxCost * t;
    return v >= 1000 ? `$${(v/1000).toFixed(1)}k` : `$${v.toFixed(0)}`;
  });

  const ticksHTML = ticks.map((t, i) => {
    const angle = Math.PI - t * Math.PI;
    const tx = cx + Math.cos(angle) * (r + 18);
    const ty = cy - Math.sin(angle) * (r + 18);
    return `<text x="${tx}" y="${ty}">${tickLabels[i]}</text>`;
  }).join("");

  return `
    <svg class="gauge-svg" viewBox="0 0 200 140">
      <g class="gauge-ticks">${ticksHTML}</g>
      <path class="gauge-track"
        d="M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}" />
      <path class="gauge-fill"
        d="M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}"
        stroke="${color}"
        stroke-dasharray="${arcLength}"
        stroke-dashoffset="${dashOffset}" />
      <g class="gauge-needle" style="transform: rotate(${pct * 180 - 90}deg)">
        <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy - needleLen}" />
        <circle cx="${cx}" cy="${cy}" r="4" />
      </g>
    </svg>
  `;
}

// ── Sparkline chart ───────────────────────────────

function createChart(cumulative, providers) {
  if (!cumulative || cumulative.length === 0) return "";

  const W = 900, H = 140, padL = 50, padR = 20, padT = 10, padB = 25;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const maxCost = Math.max(...cumulative.map((d) => d.dayCost), 0.01);
  const dates = cumulative.map((d) => d.date);

  // Grid lines
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map((pct) => {
    const y = padT + chartH - pct * chartH;
    const val = maxCost * pct;
    const label = val >= 1 ? `$${val.toFixed(0)}` : `$${val.toFixed(2)}`;
    return `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" />
            <text x="${padL - 8}" y="${y + 3}" text-anchor="end">${label}</text>`;
  }).join("");

  // Stacked bars per provider per day
  const barW = Math.max(chartW / dates.length - 2, 2);
  let bars = "";

  for (let i = 0; i < dates.length; i++) {
    const x = padL + (i / dates.length) * chartW + 1;
    let yOffset = 0;

    for (const p of providers) {
      const dayData = p.daily.find((d) => d.date === dates[i]);
      if (!dayData || dayData.cost <= 0) continue;
      const barH = (dayData.cost / maxCost) * chartH;
      const y = padT + chartH - yOffset - barH;
      bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${p.color}" opacity="0.8" rx="1" />`;
      yOffset += barH;
    }
  }

  // X-axis labels (first, middle, last)
  const xLabels = [0, Math.floor(dates.length / 2), dates.length - 1]
    .filter((i) => dates[i])
    .map((i) => {
      const x = padL + (i / dates.length) * chartW + barW / 2;
      return `<text x="${x}" y="${H - 4}" text-anchor="middle">${dates[i].slice(5)}</text>`;
    }).join("");

  return `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <g class="chart-grid">${gridLines}${xLabels}</g>
      ${bars}
    </svg>
  `;
}

// ── Spend Line Chart (daily + peaks + running avg) ─

function createSpendLineChart(cumulative) {
  if (!cumulative || cumulative.length === 0) return "";
  if (cumulative.length === 1) {
    return `<div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2);padding:20px;text-align:center">Only 1 data point — need at least 2 days</div>`;
  }

  const W = 900, H = 200, padL = 55, padR = 20, padT = 16, padB = 30;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const days = cumulative;
  const costs = days.map(d => d.dayCost);
  const maxCost = Math.max(...costs, 0.01);

  // Scale helpers
  const n = Math.max(days.length - 1, 1);
  const x = (i) => padL + (i / n) * chartW;
  const y = (v) => padT + chartH - (v / maxCost) * chartH;

  // Grid lines
  const gridSteps = [0, 0.25, 0.5, 0.75, 1];
  const gridHTML = gridSteps.map(pct => {
    const gy = padT + chartH - pct * chartH;
    const val = maxCost * pct;
    const label = val >= 100 ? `$${val.toFixed(0)}` : val >= 1 ? `$${val.toFixed(1)}` : `$${val.toFixed(2)}`;
    return `<line x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" />
            <text x="${padL - 8}" y="${gy + 3}" text-anchor="end">${label}</text>`;
  }).join("");

  // X-axis date labels (5-6 evenly spaced)
  const labelCount = Math.min(6, days.length);
  const xLabelsHTML = Array.from({ length: labelCount }, (_, i) => {
    const idx = Math.round(i * (days.length - 1) / (labelCount - 1));
    return `<text x="${x(idx)}" y="${H - 6}" text-anchor="middle">${days[idx].date.slice(5)}</text>`;
  }).join("");

  // Daily spend line
  const linePts = days.map((d, i) => `${x(i)},${y(d.dayCost)}`).join(" ");

  // Area fill under the line
  const areaPath = `M${x(0)},${y(0)} ` +
    days.map((d, i) => `L${x(i)},${y(d.dayCost)}`).join(" ") +
    ` L${x(days.length - 1)},${y(0)} Z`;

  // Small dots on each day
  const dotsHTML = days.map((d, i) =>
    `<circle class="spend-dot" cx="${x(i)}" cy="${y(d.dayCost)}" r="2.5" />`
  ).join("");

  // Find peaks (local maxima — higher than both neighbors)
  const peaks = [];
  for (let i = 1; i < days.length - 1; i++) {
    if (costs[i] > costs[i - 1] && costs[i] >= costs[i + 1] && costs[i] > 0) {
      peaks.push(i);
    }
  }
  // Include endpoints if they're notable
  if (costs.length > 1 && costs[0] > costs[1] && costs[0] > 0) peaks.unshift(0);
  if (costs.length > 1 && costs[costs.length - 1] > costs[costs.length - 2] && costs[costs.length - 1] > 0) peaks.push(costs.length - 1);

  // Peak connector line
  let peakConnectorHTML = "";
  if (peaks.length >= 2) {
    const peakPts = peaks.map(i => `${x(i)},${y(costs[i])}`).join(" ");
    peakConnectorHTML = `<polyline class="peak-connector" points="${peakPts}" />`;
  }

  // Peak dots
  const peakDotsHTML = peaks.map(i =>
    `<circle class="peak-dot" cx="${x(i)}" cy="${y(costs[i])}" r="4.5" />
     <text x="${x(i)}" y="${y(costs[i]) - 10}" text-anchor="middle"
       style="font-family:'IBM Plex Mono',monospace;font-size:9px;fill:var(--red)">$${costs[i].toFixed(2)}</text>`
  ).join("");

  // 7-day running average
  const avgWindow = 7;
  const avgPts = [];
  for (let i = 0; i < days.length; i++) {
    const windowStart = Math.max(0, i - avgWindow + 1);
    const slice = costs.slice(windowStart, i + 1);
    const avg = slice.reduce((s, v) => s + v, 0) / slice.length;
    avgPts.push(`${x(i)},${y(avg)}`);
  }
  const avgLineHTML = `<polyline class="avg-line" points="${avgPts.join(" ")}" />`;

  return `
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="height:200px">
      <defs>
        <linearGradient id="spendGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--blue)" />
          <stop offset="100%" stop-color="var(--blue)" stop-opacity="0" />
        </linearGradient>
      </defs>
      <g class="chart-grid">${gridHTML}${xLabelsHTML}</g>
      <path class="spend-area" d="${areaPath}" />
      <polyline class="spend-line" points="${linePts}" fill="none" />
      ${dotsHTML}
      ${peakConnectorHTML}
      ${peakDotsHTML}
      ${avgLineHTML}
    </svg>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--blue)"></div>Daily spend</div>
      <div class="legend-item"><div class="legend-swatch dashed"></div>7-day avg</div>
      <div class="legend-item"><div class="legend-swatch dotted"></div>Peak-to-peak</div>
    </div>
  `;
}

// ── Gauge card renderer ────────────────────────────

function renderGaugeCard(p) {
  const models = Object.entries(p.byModel)
    .sort(([,a], [,b]) => b.cost - a.cost)
    .slice(0, 5);

  const modelRows = models.map(([name, m]) => {
    const shortName = name.length > 24 ? name.slice(0, 22) + "…" : name;
    return `<div class="model-row">
      <span class="model-name" title="${name}">${shortName}</span>
      <span class="model-cost" style="color:${p.color}">$${m.cost.toFixed(2)}</span>
    </div>`;
  }).join("");

  const extraInfo = p.extra
    ? (p.extra.pctUsed !== undefined
      ? `<div class="model-row"><span class="model-name">usage</span><span class="model-cost">${p.extra.pctUsed}%</span></div>`
      : p.extra.balance !== undefined && p.extra.balance !== null
      ? `<div class="model-row"><span class="model-name">balance</span><span class="model-cost" style="color:var(--green)">$${Number(p.extra.balance).toFixed(2)}</span></div>`
      : "")
    : "";

  const noBillingMsg = p.noBillingApi
    ? `<div class="model-row" style="margin-top:6px">
         <a href="${p.dashboardUrl || '#'}" target="_blank" rel="noopener"
            style="color:${p.color};opacity:0.8;font-size:0.75rem;text-decoration:none;border-bottom:1px dashed ${p.color}">
            No billing API — check dashboard ↗
         </a>
       </div>`
    : "";

  const bodyContent = p.noBillingApi
    ? noBillingMsg
    : `${modelRows || '<div class="model-row"><span class="model-name">no model data</span><span class="model-cost">—</span></div>'}
       ${extraInfo}`;

  const pBudget = providerBudgets[p.id] || Math.max(p.totalCost * 2, 10);
  const thisMonth = new Date().toISOString().slice(0, 7);
  const cycleCost = (p.daily || [])
    .filter(d => d.date.startsWith(thisMonth))
    .reduce((sum, d) => sum + (d.cost || 0), 0);

  const dismissBtn = p.isGoogleProject
    ? `<button class="dismiss-btn" title="Remove project" onclick="if(confirm('Remove all ${p.projectSlug} tiles?'))deleteGoogleProject('${p.projectSlug}')">🗑</button>`
    : `<button class="dismiss-btn" title="Hide tile" onclick="hideProvider('${p.id}')">×</button>`;

  return `
    <div class="gauge-card">
      ${dismissBtn}
      <div class="card-header">
        <div class="running-total">$${p.totalCost.toFixed(2)} total</div>
        <div class="provider-name" style="color:${p.color}">${p.label}</div>
      </div>
      <div class="provider-cost" style="color:${gaugeColor(cycleCost, pBudget)}">$${cycleCost.toFixed(2)}</div>
      ${createGaugeSVG(cycleCost, pBudget, p.color)}
      <div class="budget-input-row">
        <span>budget $</span>
        <input type="number" class="budget-input" value="${pBudget.toFixed(0)}"
          oninput="setProviderBudget('${p.id}', this.value)" min="1" step="5">
      </div>
      <div class="model-list">
        ${bodyContent}
      </div>
    </div>`;
}

// ── Render ─────────────────────────────────────────

function render() {
  if (!data || !data.providers) return;

  const { providers, unconfigured, grandTotal, cumulative, carbon } = data;
  const budget = globalBudgetOverride || data.budget;
  const budgetPct = Math.round((grandTotal / budget) * 100);

  if (providers.length === 0) {
    document.getElementById("app").innerHTML = `
      <div class="empty-state">
        <h2>No providers configured</h2>
        <p>Copy <code>.env.example</code> to <code>.env</code> and add your API keys.</p>
      </div>`;
    return;
  }

  const totalColor = gaugeColor(grandTotal, budget);
  const dailyAvg = data.cumulative && data.cumulative.length > 0
    ? grandTotal / data.cumulative.length : 0;
  const burnRate = dailyAvg * 30;

  // Filter hidden, with showHidden override
  const visibleProviders = showHidden ? providers : providers.filter(p => !hiddenProviders.has(p.id));
  const hiddenCount = providers.filter(p => hiddenProviders.has(p.id)).length;
  const toggleEl = document.getElementById("hiddenToggle");
  if (toggleEl) {
    toggleEl.style.display = hiddenCount > 0 ? "inline" : "none";
    toggleEl.textContent = showHidden ? `hide ${hiddenCount} hidden` : `${hiddenCount} hidden`;
  }

  // Provider gauge cards — split tracked repos from standalone providers
  const repoCards = visibleProviders
    .filter(p => p.isGoogleProject)
    .map(p => renderGaugeCard(p))
    .join("");

  const standaloneCards = visibleProviders
    .filter(p => !p.isGoogleProject)
    .map(p => renderGaugeCard(p))
    .join("");

  document.getElementById("app").innerHTML = `
    <div class="grand-total-bar">
      <div style="text-align:center">
        <div class="grand-number" style="color:${totalColor}">$${grandTotal.toFixed(2)}</div>
        <div class="grand-label">30-day total</div>
      </div>
      <div class="divider-v"></div>
      <div class="grand-stat">
        <div class="value" style="color:${budgetColor(budgetPct)}">$${dailyAvg.toFixed(2)}</div>
        <div class="label">daily avg</div>
      </div>
      <div class="divider-v"></div>
      <div class="grand-stat">
        <div class="value" style="color:${budgetColor((burnRate/budget)*100)}">$${burnRate.toFixed(0)}</div>
        <div class="label">30d projection</div>
      </div>
      <div class="divider-v"></div>
      <div class="grand-stat">
        <div class="value">${providers.length}</div>
        <div class="label">providers</div>
      </div>
    </div>

    <div class="budget-section">
      <div class="budget-card">
        <div class="budget-header">
          <span class="label">Monthly Budget</span>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="pct" style="color:${budgetColor(budgetPct)}">${budgetPct}%</span>
            <div class="budget-input-row" style="margin:0">
              <span>budget $</span>
              <input type="number" class="budget-input" value="${budget.toFixed(0)}"
                oninput="setGlobalBudget(this.value)" min="1" step="10">
            </div>
          </div>
        </div>
        <div class="budget-track">
          <div class="budget-fill" style="width:${Math.min(budgetPct, 100)}%;background:${budgetColor(budgetPct)}"></div>
        </div>
      </div>
    </div>

    <div class="gauges">
      ${standaloneCards}

      <div class="section-header">
        <span class="section-title">Tracked Repos</span>
      </div>
      ${repoCards}
      <div class="add-repo-card" onclick="showAddRepoModal()">
        <div style="font-size:24px;color:var(--text2)">+</div>
        <div class="add-repo-label">Add Repo</div>
      </div>

      <div class="key-paste-card">
        <div class="key-paste-label">Add API Key</div>
        <button class="folder-scan-btn" onclick="scanFolderForKeys()">📂 Scan folder for keys</button>
        <div style="display:flex;align-items:center;gap:6px;width:100%">
          <div style="flex:1;height:1px;background:var(--border)"></div>
          <span style="font-size:10px;color:var(--text2);font-family:'IBM Plex Mono',monospace">or paste manually</span>
          <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
        <input class="key-paste-input" type="password" placeholder="Paste any API key..."
          id="keyPasteInput"
          onkeydown="if(event.key==='Enter'){const s=document.getElementById('keyPasteStatus');pasteKey(this.value,s);this.value=''}" />
        <div class="key-paste-status" id="keyPasteStatus"></div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-card">
        <div class="chart-title">Daily Spend — Trend &amp; Peaks</div>
        ${createSpendLineChart(cumulative)}
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-card">
        <div class="chart-title">Daily Spend by Provider</div>
        ${createChart(cumulative, providers)}
      </div>
    </div>

    ${carbon ? `
    <div class="carbon-section">
      <div class="carbon-card">
        <div class="carbon-icon" style="background:rgba(74,222,128,0.1);color:var(--green)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 3c-1.5 0-3 .5-4 1.5C6 6 5.5 8 6 10c-2 .5-3 2-3 4 0 2.5 2 4 4.5 4h9c2.5 0 4.5-1.5 4.5-4 0-2-1-3.5-3-4 .5-2 0-4-2-5.5C15 3.5 13.5 3 12 3z"/>
            <path d="M12 15v-5M10 12l2-2 2 2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="carbon-main">
          <div class="carbon-title">Estimated Carbon Footprint</div>
          <div class="carbon-value" style="color:var(--green)">${formatCarbonDisplay(carbon.co2Grams)}</div>
          <div class="carbon-comparison">${carbon.comparison.text}</div>
        </div>
        <div class="carbon-stats">
          <div class="carbon-stat">
            <div class="cs-value">${formatGpuTime(carbon.gpuSeconds)}</div>
            <div class="cs-label">GPU time</div>
          </div>
          <div class="carbon-stat">
            <div class="cs-value">${carbon.energyKwh.toFixed(2)} kWh</div>
            <div class="cs-label">Energy</div>
          </div>
          <div class="carbon-stat">
            <div class="cs-value">$${(carbon.co2Grams * 0.000017).toFixed(4)}</div>
            <div class="cs-label">Offset cost</div>
          </div>
        </div>
        <div class="carbon-methodology">${carbon.methodology}</div>
      </div>
    </div>
    ` : ""}
  `;
}
</script>
</body>
</html>
